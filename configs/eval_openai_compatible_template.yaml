# Template for running a real OpenAI-compatible target LLM.
# Copy this file, adjust dataset/sampling as needed, and fill in .env.

run_id: answer_accuracy_real_model
dataset: datasets/samples/core_demo_tasks.json
output_dir: outputs/runs
default_pass_threshold: ${EVAL_PASS_THRESHOLD}
notes: "Template real-model run using OpenAI-compatible provider settings from .env."

models:
  - name: ${OPENAI_GENERATION_MODEL}
    provider: openai_compatible
    model: ${OPENAI_GENERATION_MODEL}
    api_version: ${OPENAI_API_VERSION}
    # Some GPT-5/reasoning deployments reject temperature and token controls.
    # Set OPENAI_TEMPERATURE=omit, OPENAI_MAX_TOKENS=omit, and OPENAI_TOKEN_PARAMETER=
    # in .env to skip them. Unresolved placeholders are also treated as omitted here.
    temperature: ${OPENAI_TEMPERATURE}
    max_tokens: ${OPENAI_MAX_TOKENS}
    token_parameter: ${OPENAI_TOKEN_PARAMETER}
